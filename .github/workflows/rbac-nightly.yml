name: RBAC Nightly

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

jobs:
  rbac-nightly:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: RBAC Nightly Suite
        run: make rbac:nightly

      - name: Upload RBAC artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rbac-nightly-artifacts
          path: |
            test_reports/rbac_nightly_*.json
            test_reports/rbac_policy_diff.json
            test_reports/rbac_policy_snapshot_*.json
            test_reports/pytest/rbac_suite_results.xml