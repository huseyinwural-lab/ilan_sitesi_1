name: Nightly E2E Extended

on:
  schedule:
    - cron: "15 2 * * *"
  workflow_dispatch:

jobs:
  nightly-e2e-extended:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Nightly E2E Extended suite
        run: make nightly:e2e

      - name: Upload Nightly E2E artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-e2e-extended-artifacts
          path: |
            test_reports/nightly_e2e_extended.json
