name: Nightly E2E Merge Gate

on:
  pull_request:
    paths:
      - "backend/server.py"
      - "backend/tests/**"
      - "frontend/src/pages/**"
      - "frontend/src/components/**"
      - "scripts/nightly_e2e_extended_runner.py"
      - ".github/workflows/nightly-e2e-*.yml"
      - "Makefile"

jobs:
  nightly-e2e-gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Nightly E2E check (merge gate)
        run: make nightly:e2e:check

      - name: Upload Nightly E2E gate artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-e2e-merge-gate-artifacts
          path: |
            test_reports/nightly_e2e_extended.json
