name: Lint Gate

on:
  push:
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Backend lint (ruff)
        run: |
          python -m pip install --upgrade pip
          pip install ruff
          ruff check backend

      - name: Frontend lint (eslint)
        working-directory: frontend
        run: |
          yarn install
          npx eslint "src/**/*.{js,jsx}" --max-warnings=0

      - name: Archive release artifacts (best-effort)
        if: always()
        run: |
          chmod +x scripts/archive_release_artifacts.sh
          RELEASE_ID="release-$(date -u +%Y%m%d-%H%M)" \
          RELEASE_DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
          VALIDATED_LOCALES="TR,DE,FR" \
          PRESET_BATCH_SIZE="100" \
          VALIDATED_BY="${GITHUB_ACTOR}" \
          TRIGGER_SOURCE="ci" \
          MAX_RELEASES="20" \
          scripts/archive_release_artifacts.sh

      - name: Upload release artifacts archive
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-artifacts-${{ github.sha }}
          path: release-artifacts/
